name: Compile rule-sets

on:
  push:
    paths:
      - "source/**"
  pull_request:
    paths:
      - "source/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install sing-box
        run: |
          curl -fsSL https://sing-box.app/install.sh -o install.sh
          sudo bash install.sh
          sing-box version

      - name: Validate JSON syntax
        run: |
          for f in source/*.json; do
            python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f" \
              && echo "valid  $f" \
              || { echo "::error file=$f::JSON 语法错误"; exit 1; }
          done

      - name: Compile source -> srs
        run: |
          mkdir -p srs
          for f in source/*.json; do
            name="$(basename "$f" .json)"
            sing-box rule-set compile "$f" -o "srs/$name.srs" \
              || { echo "::error file=$f::规则编译失败"; exit 1; }
            echo "compiled $name"
          done

      - name: Check cross-list conflicts
        run: python3 scripts/check_conflicts.py --strict

      # PR 只做校验，不提交；只有 push / 手动触发才回写编译产物
      - name: Commit compiled rule-sets
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add srs/
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "ci: recompile rule-sets"
            git push
          fi
