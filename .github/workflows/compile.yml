name: Compile rule-sets

on:
  push:
    paths:
      - "source/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          curl -fsSL https://sing-box.app/install.sh -o install.sh
          sudo bash install.sh
          sing-box version

      - name: Compile source -> srs
        run: |
          mkdir -p srs
          for f in source/*.json; do
            name="$(basename "$f" .json)"
            sing-box rule-set compile "$f" -o "srs/$name.srs"
            echo "compiled $name"
          done

      - name: Commit compiled rule-sets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add srs/
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "ci: recompile rule-sets"
            git push
          fi
